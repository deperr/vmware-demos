---

# Workflow Step 1: VMware Discovery
# Purpose: Discover VMs with attached CD drives and prepare dynamic inventory
# Credentials: VMware credential required
# Inventory: localhost

- name: Discover VMs with attached CD drives
  hosts: localhost
  gather_facts: false
  vars:
    vms_with_cdrom: []

  tasks:

    - name: Retrieve all virtual machines from vCenter
      register: all_vms
      vmware.vmware_rest.vcenter_vm_info:

    - name: Display total VM count
      ansible.builtin.debug:
        msg: "Found {{ all_vms.value | length }} virtual machines in vCenter"

    - name: Initialize variables for CD-ROM tracking
      ansible.builtin.set_fact:
        vms_with_cdrom: []
        current_timestamp: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Check each VM for CD-ROM devices
      register: vm_cdrom_check
      loop: "{{ all_vms.value }}"
      loop_control:
        loop_var: vm_item
        label: "{{ vm_item.name }}"
      vmware.vmware_rest.vcenter_vm_hardware_cdrom_info:
        vm: "{{ vm_item.vm }}"

    - name: Identify VMs with CD-ROM devices attached
      when: 
        - vm_cdrom_check.results is defined
        - cdrom_result.value is defined
        - cdrom_result.value | length > 0
      loop: "{{ vm_cdrom_check.results }}"
      loop_control:
        loop_var: cdrom_result
        label: "{{ cdrom_result.vm_item.name }}"
      ansible.builtin.set_fact:
        vms_with_cdrom: "{{ vms_with_cdrom + [{'vm_id': cdrom_result.vm_item.vm, 'vm_name': cdrom_result.vm_item.name, 'power_state': cdrom_result.vm_item.power_state, 'cdrom_devices': cdrom_result.value}] }}"

    - name: Display VMs with CD-ROM devices
      ansible.builtin.debug:
        msg: 
          - "Found {{ vms_with_cdrom | length }} VMs with CD-ROM devices attached"
          - "VMs with CD-ROM: {{ vms_with_cdrom | map(attribute='vm_name') | list }}"

    - name: Create detailed CD-ROM inventory
      when: vms_with_cdrom | length > 0
      loop: "{{ vms_with_cdrom }}"
      loop_control:
        loop_var: vm_with_cdrom
        label: "{{ vm_with_cdrom.vm_name }}"
      ansible.builtin.debug:
        msg:
          - "VM: {{ vm_with_cdrom.vm_name }} ({{ vm_with_cdrom.vm_id }})"
          - "Power State: {{ vm_with_cdrom.power_state }}"
          - "CD-ROM Devices: {{ vm_with_cdrom.cdrom_devices | length }}"
          - "Device Details: {{ vm_with_cdrom.cdrom_devices }}"

    - name: Prepare workflow artifacts for next steps
      when: vms_with_cdrom | length > 0
      ansible.builtin.set_stats:
        data:
          # Complete VM data for final detachment step
          all_vms_with_cdrom: "{{ vms_with_cdrom }}"
          # Powered-on VMs for dismount step
          powered_on_vms: "{{ vms_with_cdrom | selectattr('power_state', 'equalto', 'POWERED_ON') | map(attribute='vm_name') | list }}"
          # Metadata
          discovery_timestamp: "{{ current_timestamp }}"
          total_vms_found: "{{ vms_with_cdrom | length }}"
          powered_on_count: "{{ vms_with_cdrom | selectattr('power_state', 'equalto', 'POWERED_ON') | list | length }}"
        per_host: false
        aggregate: true

    - name: Display workflow preparation summary
      ansible.builtin.debug:
        msg: |
          Discovery Results:
          - Total VMs with CD-ROM devices: {{ vms_with_cdrom | length }}
          - Powered-on VMs requiring dismount: {{ vms_with_cdrom | selectattr('power_state', 'equalto', 'POWERED_ON') | list | length }}
          
          {% if vms_with_cdrom | selectattr('power_state', 'equalto', 'POWERED_ON') | list | length > 0 %}
          VMs to process in next workflow step:
          {% for vm in vms_with_cdrom | selectattr('power_state', 'equalto', 'POWERED_ON') | list %}
          - {{ vm.vm_name }} ({{ vm.cdrom_devices | length }} CD-ROM device(s))
          {% endfor %}
          
          NEXT WORKFLOW STEP: CD Dismount
          - Target inventory: Powered-on VMs listed above
          - Required credential: Machine credential for VM access
          {% else %}
          No powered-on VMs found - workflow can skip dismount step
          {% endif %}
          
          Workflow artifacts saved for subsequent steps
          ==========================================

    - name: Handle case when no VMs with CD-ROM devices found
      when: vms_with_cdrom | length == 0
      block:
        - name: Set empty workflow artifacts
          ansible.builtin.set_stats:
            data:
              all_vms_with_cdrom: []
              powered_on_vms: []
              discovery_timestamp: "{{ current_timestamp }}"
              total_vms_found: 0
              powered_on_count: 0
            per_host: false
            aggregate: true

        - name: Display no VMs found message
          ansible.builtin.debug:
            msg: |
              ===== WORKFLOW STEP 1 COMPLETED =====
              No VMs with CD-ROM devices found in vCenter
              
              Discovery Results:
              - Total VMs scanned: {{ all_vms.value | length }}
              - VMs with CD-ROM devices: 0
              
              WORKFLOW STATUS: Complete (no further steps needed)
              ==========================================
