---

- name: Discover VMs with attached CD drives (Alternative Multi-Task Approach)
  hosts: localhost
  gather_facts: false
  vars:
    vms_with_cdrom: []

  tasks:

    - name: Retrieve all virtual machines from vCenter
      register: all_vms
      vmware.vmware_rest.vcenter_vm_info:

    - name: Display total VM count
      ansible.builtin.debug:
        msg: "Found {{ all_vms.value | length }} virtual machines in vCenter"

    - name: Initialize variables for CD-ROM tracking
      ansible.builtin.set_fact:
        vms_with_cdrom: []
        current_timestamp: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Check each VM for CD-ROM devices
      register: vm_cdrom_check
      loop: "{{ all_vms.value }}"
      loop_control:
        loop_var: vm_item
        label: "{{ vm_item.name }}"
      vmware.vmware_rest.vcenter_vm_hardware_cdrom_info:
        vm: "{{ vm_item.vm }}"

    - name: Identify VMs with CD-ROM devices attached
      when: 
        - vm_cdrom_check.results is defined
        - cdrom_result.value is defined
        - cdrom_result.value | length > 0
      loop: "{{ vm_cdrom_check.results }}"
      loop_control:
        loop_var: cdrom_result
        label: "{{ cdrom_result.vm_item.name }}"
      ansible.builtin.set_fact:
        vms_with_cdrom: "{{ vms_with_cdrom + [{'vm_id': cdrom_result.vm_item.vm, 'vm_name': cdrom_result.vm_item.name, 'power_state': cdrom_result.vm_item.power_state, 'cdrom_devices': cdrom_result.value}] }}"

    - name: Display VMs with CD-ROM devices
      ansible.builtin.debug:
        msg: 
          - "Found {{ vms_with_cdrom | length }} VMs with CD-ROM devices attached"
          - "VMs with CD-ROM: {{ vms_with_cdrom | map(attribute='vm_name') | list }}"

    - name: Create detailed CD-ROM inventory
      when: vms_with_cdrom | length > 0
      loop: "{{ vms_with_cdrom }}"
      loop_control:
        loop_var: vm_with_cdrom
        label: "{{ vm_with_cdrom.vm_name }}"
      ansible.builtin.debug:
        msg:
          - "VM: {{ vm_with_cdrom.vm_name }} ({{ vm_with_cdrom.vm_id }})"
          - "Power State: {{ vm_with_cdrom.power_state }}"
          - "CD-ROM Devices: {{ vm_with_cdrom.cdrom_devices | length }}"
          - "Device Details: {{ vm_with_cdrom.cdrom_devices }}"

# Second play to get into the Linux VM's to dismount
- name: Dismount CD drives from Linux VMs using multiple discrete tasks
  hosts: vm_with_cdrom
  gather_facts: false
  become: true

  tasks:

    - name: Check if /dev/sr0 exists on this VM
      register: sr0_check
      failed_when: false
      ansible.builtin.stat:
        path: /dev/sr0

    - name: Display /dev/sr0 device status
      ansible.builtin.debug:
        msg: |
          VM: {{ inventory_hostname }}
          /dev/sr0 exists: {{ sr0_check.stat.exists | default(false) }}

    - name: Check mount status of /dev/sr0
      when: sr0_check.stat.exists | default(false)
      register: mount_check
      failed_when: false
      ansible.builtin.shell: mount | grep "/dev/sr0" || echo "NOT_MOUNTED"

    - name: Display mount status
      when: sr0_check.stat.exists | default(false)
      ansible.builtin.debug:
        msg: |
          VM: {{ inventory_hostname }}
          Mount check result: {{ mount_check.stdout | default('Device not found') }}
          Is mounted: {{ "/dev/sr0" in (mount_check.stdout | default("")) }}

    - name: Get mount point for /dev/sr0
      when: 
        - sr0_check.stat.exists | default(false)
        - mount_check.stdout is defined
        - mount_check.stdout != "NOT_MOUNTED"
        - '"/dev/sr0" in mount_check.stdout'
      register: mount_point_check
      ansible.builtin.shell: echo "{{ mount_check.stdout }}" | awk '{print $3}' | head -n1

    - name: Identify processes using CD-ROM mount point
      when: 
        - sr0_check.stat.exists | default(false)
        - mount_point_check is defined
        - mount_point_check.stdout is defined
        - mount_point_check.stdout | length > 0
      register: lsof_check
      failed_when: false
      ansible.builtin.shell: |
        mount_point="{{ mount_point_check.stdout }}"
        if [ -n "$mount_point" ]; then
          echo "Checking processes using: $mount_point"
          lsof "$mount_point" 2>/dev/null || echo "NO_PROCESSES"
        else
          echo "NO_MOUNT_POINT"
        fi

    - name: Display processes using mount point
      when: 
        - lsof_check is defined
        - lsof_check.stdout is defined
        - lsof_check.stdout != "NO_PROCESSES"
        - lsof_check.stdout != "NO_MOUNT_POINT"
      ansible.builtin.debug:
        msg: |
          VM: {{ inventory_hostname }}
          Processes using mount point:
          {{ lsof_check.stdout }}

    - name: Kill processes using CD-ROM mount point
      when: 
        - lsof_check is defined
        - lsof_check.stdout is defined
        - lsof_check.stdout != "NO_PROCESSES"
        - lsof_check.stdout != "NO_MOUNT_POINT"
        - '"COMMAND" in lsof_check.stdout'  # lsof output contains actual processes
      failed_when: false
      ansible.builtin.shell: |
        mount_point="{{ mount_point_check.stdout }}"
        echo "Attempting to kill processes using $mount_point"
        
        # Try graceful termination first
        pids=$(lsof -t "$mount_point" 2>/dev/null || true)
        if [ -n "$pids" ]; then
          echo "Sending TERM signal to PIDs: $pids"
          echo "$pids" | xargs -r kill -TERM 2>/dev/null || true
          sleep 2
          
          # Force kill if still running
          pids=$(lsof -t "$mount_point" 2>/dev/null || true)
          if [ -n "$pids" ]; then
            echo "Sending KILL signal to remaining PIDs: $pids"
            echo "$pids" | xargs -r kill -KILL 2>/dev/null || true
            sleep 1
          fi
          echo "Process cleanup completed"
        else
          echo "No processes found to kill"
        fi

    - name: Attempt to unmount /dev/sr0
      when: 
        - sr0_check.stat.exists | default(false)
        - mount_check.stdout is defined
        - mount_check.stdout != "NOT_MOUNTED"
        - '"/dev/sr0" in mount_check.stdout'
      register: unmount_result
      failed_when: false
      ansible.builtin.shell: |
        echo "=== Unmounting /dev/sr0 ==="
        echo "Attempting regular unmount..."
        if umount /dev/sr0 2>/dev/null; then
          echo "SUCCESS: Regular unmount successful"
          exit 0
        else
          echo "Regular unmount failed, trying force unmount..."
          if umount -f /dev/sr0 2>/dev/null; then
            echo "SUCCESS: Force unmount successful"
            exit 0
          else
            echo "FAILED: Could not unmount /dev/sr0"
            exit 1
          fi
        fi

    - name: Display unmount results
      when: unmount_result is defined
      ansible.builtin.debug:
        msg: |
          VM: {{ inventory_hostname }}
          Unmount result: {{ unmount_result.stdout }}
          Unmount success: {{ unmount_result.rc == 0 }}

    - name: Attempt to eject CD-ROM media
      when: sr0_check.stat.exists | default(false)
      register: eject_result
      failed_when: false
      ansible.builtin.shell: |
        echo "=== Ejecting CD-ROM Media ==="
        if command -v eject >/dev/null 2>&1; then
          echo "Attempting to eject /dev/sr0..."
          if eject /dev/sr0 2>/dev/null; then
            echo "SUCCESS: Ejected /dev/sr0"
          else
            echo "INFO: Could not eject (may be empty or already ejected)"
          fi
        else
          echo "INFO: eject command not available"
        fi

    - name: Display eject results
      when: eject_result is defined
      ansible.builtin.debug:
        msg: |
          VM: {{ inventory_hostname }}
          Eject result: {{ eject_result.stdout }}

    - name: Verify final mount status
      register: final_mount_check
      failed_when: false
      ansible.builtin.shell: |
        echo "=== Final Mount Status Check ==="
        if mount | grep -q "/dev/sr0"; then
          echo "WARNING: /dev/sr0 is still mounted:"
          mount | grep "/dev/sr0"
          exit 1
        else
          echo "SUCCESS: /dev/sr0 is not mounted - ready for VMware detachment"
          exit 0
        fi

    - name: Display final status
      ansible.builtin.debug:
        msg: |
          ===== FINAL STATUS for {{ inventory_hostname }} =====
          Device exists: {{ sr0_check.stat.exists | default(false) }}
          Final mount status: {{ final_mount_check.stdout }}
          Ready for VMware detachment: {{ final_mount_check.rc == 0 }}
          ================================================

- name: Detach CD-ROM devices from VMware
  hosts: localhost
  gather_facts: false

  tasks:

    - name: Display summary of VMs processed
      when: groups['linux_vms_with_cdrom_alt'] | default([]) | length > 0
      ansible.builtin.debug:
        msg: |
          ===== DISMOUNT PHASE COMPLETED =====
          VMs processed for dismount: {{ groups['linux_vms_with_cdrom_alt'] | default([]) | length }}
          VMs: {{ groups['linux_vms_with_cdrom_alt'] | default([]) | join(', ') }}
          
          Proceeding with VMware detachment...

    - name: Wait for dismount operations to stabilize
      when: groups['linux_vms_with_cdrom_alt'] | default([]) | length > 0
      ansible.builtin.pause:
        seconds: 5
        prompt: "Waiting for CD dismount operations to complete before attempting VMware detachment"

    - name: Detach CD-ROM devices from virtual machines
      when: hostvars['localhost']['all_vms_with_cdrom'] is defined
      register: detachment_result
      failed_when: false
      loop: "{{ hostvars['localhost']['all_vms_with_cdrom'] | subelements('cdrom_devices') }}"
      loop_control:
        loop_var: cdrom_item
        label: "{{ cdrom_item.0.vm_name }} - CDROM {{ cdrom_item.1.cdrom }}"
      vmware.vmware_rest.vcenter_vm_hardware_cdrom:
        vm: "{{ cdrom_item.0.vm_id }}"
        cdrom: "{{ cdrom_item.1.cdrom }}"
        state: disconnect # this can be set to absent to remove the drive

    - name: Display detailed detachment results
      when: detachment_result is defined
      loop: "{{ detachment_result.results | default([]) }}"
      loop_control:
        loop_var: result_item
        label: "{{ result_item.cdrom_item.0.vm_name }}"
      ansible.builtin.debug:
        msg: |
          ===== VMware Detachment Result =====
          VM: {{ result_item.cdrom_item.0.vm_name }}
          CD-ROM ID: {{ result_item.cdrom_item.1.cdrom }}
          Detachment Status: {{ 'SUCCESS' if not result_item.failed else 'FAILED' }}
          {% if result_item.failed %}Error: {{ result_item.msg | default('Unknown error') }}{% endif %}
          ====================================

    - name: Generate comprehensive final report
      when: 
        - hostvars['localhost']['all_vms_with_cdrom'] is defined
        - detachment_result is defined
      ansible.builtin.debug:
        msg: |
          ===== COMPLETE CD-ROM MANAGEMENT REPORT (MULTI-TASK APPROACH) =====
          Execution Timestamp: {{ hostvars['localhost']['current_timestamp'] }}
          
          DISCOVERY PHASE:
          - Total VMs scanned: {{ hostvars['localhost']['all_vms_with_cdrom'] | length if hostvars['localhost']['all_vms_with_cdrom'] is defined else 0 }}
          - VMs with CD-ROM devices: {{ hostvars['localhost']['all_vms_with_cdrom'] | length }}
          
          DISMOUNT PHASE:
          - Powered-on VMs processed: {{ groups['linux_vms_with_cdrom_alt'] | default([]) | length }}
          - Dismount approach: Multiple discrete tasks per VM
          
          DETACHMENT PHASE:
          - Total detachment attempts: {{ detachment_result.results | length }}
          - Successful detachments: {{ detachment_result.results | selectattr('failed', 'equalto', false) | list | length }}
          - Failed detachments: {{ detachment_result.results | selectattr('failed', 'equalto', true) | list | length }}
          
          {% if detachment_result.results | selectattr('failed', 'equalto', true) | list | length > 0 %}
          FAILED DETACHMENTS REQUIRING ATTENTION:
          {% for failed_item in detachment_result.results | selectattr('failed', 'equalto', true) | list %}
          - {{ failed_item.cdrom_item.0.vm_name }}: {{ failed_item.msg | default('Unknown error') }}
          {% endfor %}
          {% endif %}
          
          MULTI-TASK APPROACH COMPLETED SUCCESSFULLY
          =========================================================
