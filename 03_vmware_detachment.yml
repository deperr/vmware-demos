---

- name: Detach CD-ROM devices from VMware
  hosts: localhost
  gather_facts: false
  vars:
    all_vms_with_cdrom: "{{ all_vms_with_cdrom | default([]) }}"
    powered_on_vms: "{{ powered_on_vms | default([]) }}"
    discovery_timestamp: "{{ discovery_timestamp | default('Unknown') }}"
    total_vms_found: "{{ total_vms_found | default(0) }}"
    powered_on_count: "{{ powered_on_count | default(0) }}"

  tasks:

    - name: Display workflow context and dismount results
      when: all_vms_with_cdrom | length > 0
      ansible.builtin.debug:
        msg: |
          ===== WORKFLOW STEP 3: VMware Detachment =====
          
          Discovery Results (from Step 1):
          - Discovery timestamp: {{ discovery_timestamp }}
          - Total VMs with CD-ROM: {{ total_vms_found }}
          - Powered-on VMs: {{ powered_on_count }}
          
          {% if powered_on_count > 0 %}
          Dismount Results (from Step 2):
          {% for vm_name in powered_on_vms %}
          - {{ vm_name }}: {{ hostvars['localhost'][vm_name + '_dismount_status'] | default('unknown') }}
            {% if hostvars['localhost'][vm_name + '_final_output'] is defined %}
            Status: {{ hostvars['localhost'][vm_name + '_final_output'] }}
            {% endif %}
          {% endfor %}
          {% else %}
          No powered-on VMs were processed (all VMs were powered off)
          {% endif %}
          
          Proceeding with VMware CD-ROM detachment...
          =============================================

    - name: Handle case when no VMs with CD-ROM devices found
      when: all_vms_with_cdrom | length == 0
      ansible.builtin.debug:
        msg: |
          ===== WORKFLOW STEP 3: VMware Detachment =====
          No VMs with CD-ROM devices found in discovery step
          Nothing to detach - workflow complete
          =============================================

    - name: Wait for dismount operations to stabilize
      when: 
        - all_vms_with_cdrom | length > 0
        - powered_on_count > 0
      ansible.builtin.pause:
        seconds: 5
        prompt: "Waiting for CD dismount operations to complete before attempting VMware detachment"

    - name: Detach CD-ROM devices from virtual machines
      when: all_vms_with_cdrom | length > 0
      register: detachment_result
      failed_when: false
      loop: "{{ all_vms_with_cdrom | subelements('cdrom_devices') }}"
      loop_control:
        loop_var: cdrom_item
        label: "{{ cdrom_item.0.vm_name }} - CDROM {{ cdrom_item.1.cdrom }}"
      vmware.vmware_rest.vcenter_vm_hardware_cdrom:
        vm: "{{ cdrom_item.0.vm_id }}"
        cdrom: "{{ cdrom_item.1.cdrom }}"
        state: disconnect # this can be set to absent to remove the drive

    - name: Display detailed detachment results
      when: 
        - all_vms_with_cdrom | length > 0
        - detachment_result is defined
      loop: "{{ detachment_result.results | default([]) }}"
      loop_control:
        loop_var: result_item
        label: "{{ result_item.cdrom_item.0.vm_name }}"
      ansible.builtin.debug:
        msg: |
          ===== VMware Detachment Result =====
          VM: {{ result_item.cdrom_item.0.vm_name }}
          CD-ROM ID: {{ result_item.cdrom_item.1.cdrom }}
          Detachment Status: {{ 'SUCCESS' if not result_item.failed else 'FAILED' }}
          {% if result_item.failed %}Error: {{ result_item.msg | default('Unknown error') }}{% endif %}
          {% if result_item.cdrom_item.0.vm_name in powered_on_vms %}
          Dismount Status: {{ hostvars['localhost'][result_item.cdrom_item.0.vm_name + '_dismount_status'] | default('unknown') }}
          {% else %}
          Dismount Status: VM was powered off - dismount not attempted
          {% endif %}
          ====================================

    - name: Analyze detachment failures and correlate with dismount status
      when: 
        - all_vms_with_cdrom | length > 0
        - detachment_result is defined
      vars:
        failed_detachments: "{{ detachment_result.results | selectattr('failed', 'equalto', true) | list }}"
        successful_detachments: "{{ detachment_result.results | selectattr('failed', 'equalto', false) | list }}"
      ansible.builtin.debug:
        msg: |
          ===== DETACHMENT ANALYSIS =====
          
          Overall Results:
          - Total detachment attempts: {{ detachment_result.results | length }}
          - Successful detachments: {{ successful_detachments | length }}
          - Failed detachments: {{ failed_detachments | length }}
          
          {% if failed_detachments | length > 0 %}
          Failed Detachments Analysis:
          {% for failed_item in failed_detachments %}
          {% set vm_name = failed_item.cdrom_item.0.vm_name %}
          - {{ vm_name }}:
            Error: {{ failed_item.msg | default('Unknown error') }}
            {% if vm_name in powered_on_vms %}
            Dismount status: {{ hostvars['localhost'][vm_name + '_dismount_status'] | default('unknown') }}
            {% if hostvars['localhost'][vm_name + '_dismount_status'] | default('') == 'failed' %}
            Likely cause: CD still mounted in guest OS
            {% endif %}
            {% else %}
            VM was powered off - dismount not attempted
            {% endif %}
          {% endfor %}
          {% endif %}
          
          {% if successful_detachments | length > 0 %}
          Successful Detachments:
          {% for success_item in successful_detachments %}
          {% set vm_name = success_item.cdrom_item.0.vm_name %}
          - {{ vm_name }}: CD-ROM {{ success_item.cdrom_item.1.cdrom }} detached successfully
          {% endfor %}
          {% endif %}
          ===============================

    - name: Save final workflow results
      when: all_vms_with_cdrom | length > 0
      ansible.builtin.set_stats:
        data:
          workflow_completion_timestamp: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
          total_detachment_attempts: "{{ detachment_result.results | length if detachment_result is defined else 0 }}"
          successful_detachments: "{{ detachment_result.results | selectattr('failed', 'equalto', false) | list | length if detachment_result is defined else 0 }}"
          failed_detachments: "{{ detachment_result.results | selectattr('failed', 'equalto', true) | list | length if detachment_result is defined else 0 }}"
          workflow_status: "{{ 'completed_with_errors' if (detachment_result is defined and detachment_result.results | selectattr('failed', 'equalto', true) | list | length > 0) else 'completed_successfully' }}"
        per_host: false
        aggregate: true

    - name: Generate comprehensive final workflow report
      when: all_vms_with_cdrom | length > 0
      ansible.builtin.debug:
        msg: |
          ===== COMPLETE CD-ROM MANAGEMENT WORKFLOW REPORT =====
          Workflow Execution Summary:
          - Start time: {{ discovery_timestamp }}
          - Completion time: {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}
          - Approach: Multi-task discrete operations
          
          VMware Discovery:
          - Total VMs with CD-ROM devices: {{ total_vms_found }}
          - Powered-on VMs requiring dismount: {{ powered_on_count }}
          - Powered-off VMs (dismount skipped): {{ total_vms_found - powered_on_count }}
          
          Linux Dismount:
          {% if powered_on_count > 0 %}
          - VMs processed: {{ powered_on_count }}
          {% for vm_name in powered_on_vms %}
          - {{ vm_name }}: {{ hostvars['localhost'][vm_name + '_dismount_status'] | default('unknown') | title }}
          {% endfor %}
          {% else %}
          - No powered-on VMs to process
          {% endif %}
          
          VMware Detachment:
          {% if detachment_result is defined %}
          - Total detachment attempts: {{ detachment_result.results | length }}
          - Successful detachments: {{ detachment_result.results | selectattr('failed', 'equalto', false) | list | length }}
          - Failed detachments: {{ detachment_result.results | selectattr('failed', 'equalto', true) | list | length }}
          
          {% if detachment_result.results | selectattr('failed', 'equalto', true) | list | length > 0 %}
          ATTENTION REQUIRED - Failed Detachments:
          {% for failed_item in detachment_result.results | selectattr('failed', 'equalto', true) | list %}
          - {{ failed_item.cdrom_item.0.vm_name }}: {{ failed_item.msg | default('Unknown error') }}
          {% endfor %}
          
          Recommended Actions:
          1. Check if CDs are still mounted in guest OS on failed VMs
          2. Verify VMware permissions for CD-ROM device management
          3. Consider manual intervention for persistent failures
          {% else %}
          All CD-ROM devices successfully detached!
          {% endif %}
          {% else %}
          - No detachment operations performed
          {% endif %}
          
          WORKFLOW STATUS: {{ 'COMPLETED WITH ERRORS' if (detachment_result is defined and detachment_result.results | selectattr('failed', 'equalto', true) | list | length > 0) else 'COMPLETED SUCCESSFULLY' }}
          ========================================================

    - name: Display workflow completion message for empty case
      when: all_vms_with_cdrom | length == 0
      ansible.builtin.debug:
        msg: |
          ===== CD-ROM MANAGEMENT WORKFLOW COMPLETED =====
          Result: No VMs with CD-ROM devices found
          Status: COMPLETED SUCCESSFULLY (nothing to process)
          ================================================
